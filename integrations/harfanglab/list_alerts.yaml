type: action
definition:
  name: list_alerts
  namespace: tools.harfanglab
  title: List Security Alerts
  description: |
    Fetch security alerts from HarfangLab EDR.
    Supports filtering by status (ACTIVE/CLOSED), alert type (sigma, yara, hlai, vt, ransom, ioc, glimps),
    severity level, and date range. Returns paginated results.
  author: Tracecat Integration Builder
  display_group: HarfangLab EDR
  doc_url: https://harfanglab.io/fr/
  expects:
    base_url:
      type: str
      description: "HarfangLab instance URL (e.g. https://edr.company.com:8443)"
      default: null
    status:
      type: str
      description: "Alert status filter: ACTIVE (new/investigating) or CLOSED (closed/false_positive). Leave empty for all."
      default: null
    alert_type:
      type: str
      description: "Comma-separated alert types: sigma, yara, hlai, vt, ransom, ioc, glimps. Leave empty for all."
      default: null
    min_severity:
      type: str
      description: "Minimum severity: Informational, Low, Medium, High, Critical"
      default: null
    since_minutes:
      type: int
      description: "Fetch alerts from the last N minutes"
      default: 60
    limit:
      type: int
      description: "Maximum number of alerts to return"
      default: 50
    offset:
      type: int
      description: "Pagination offset"
      default: 0
  steps:
    - ref: http_call
      action: core.http_request
      args:
        method: GET
        url: ${{ inputs.base_url }}/api/data/alert/alert/Alert/
        headers:
          Authorization: Token ${{ SECRETS.harfanglab.API_KEY }}
          Accept: application/json
        params:
          ordering: -alert_time
          limit: ${{ inputs.limit }}
          offset: ${{ inputs.offset }}
          status: ${{ inputs.status }}
          alert_type: ${{ inputs.alert_type }}
          level: ${{ inputs.min_severity }}
  returns: ${{ steps.http_call.result }}
