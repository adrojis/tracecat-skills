type: action
definition:
  name: search_processes
  namespace: tools.harfanglab
  title: Search Processes (Telemetry)
  description: |
    Search process telemetry data in HarfangLab EDR.
    Find processes by hash (MD5, SHA1, SHA256), process name, or image name.
    Useful for threat hunting and IOC investigation.
  author: Tracecat Integration Builder
  display_group: HarfangLab EDR
  expects:
    base_url:
      type: str
      description: "HarfangLab instance URL"
      default: null
    hash:
      type: str
      description: "Hash to search (MD5, SHA1, or SHA256)"
      default: null
    hash_type:
      type: str
      description: "Hash type: md5, sha1, sha256"
      default: sha256
    process_name:
      type: str
      description: "Process name to search"
      default: null
    hostname:
      type: str
      description: "Filter by hostname"
      default: null
    limit:
      type: int
      description: "Maximum results"
      default: 100
  steps:
    - ref: http_call
      action: core.http_request
      args:
        method: GET
        url: ${{ inputs.base_url }}/api/data/telemetry/Processes/
        headers:
          Authorization: Token ${{ SECRETS.harfanglab.API_KEY }}
          Accept: application/json
        params:
          "hashes.${{ inputs.hash_type }}__exact": ${{ inputs.hash }}
          process_name: ${{ inputs.process_name }}
          agent__hostname: ${{ inputs.hostname }}
          limit: ${{ inputs.limit }}
  returns: ${{ steps.http_call.result }}
