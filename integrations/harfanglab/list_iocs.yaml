type: action
definition:
  name: list_iocs
  namespace: tools.harfanglab
  title: List IOC Rules
  description: |
    List IOC (Indicator of Compromise) rules configured in HarfangLab threat intelligence.
    Filter by source or search term.
  author: Tracecat Integration Builder
  display_group: HarfangLab EDR
  expects:
    base_url:
      type: str
      description: "HarfangLab instance URL"
      default: null
    source_id:
      type: str
      description: "Filter by IOC source ID"
      default: null
    search:
      type: str
      description: "Search term to filter IOCs"
      default: null
    limit:
      type: int
      description: "Maximum results"
      default: 50
  steps:
    - ref: http_call
      action: core.http_request
      args:
        method: GET
        url: ${{ inputs.base_url }}/api/data/threat_intelligence/IOCRule/
        headers:
          Authorization: Token ${{ SECRETS.harfanglab.API_KEY }}
          Accept: application/json
        params:
          source_id: ${{ inputs.source_id }}
          search: ${{ inputs.search }}
          limit: ${{ inputs.limit }}
  returns: ${{ steps.http_call.result }}
