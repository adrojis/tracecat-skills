type: action
definition:
  name: update_alert_status
  namespace: tools.harfanglab
  title: Update Alert Status
  description: |
    Change the status of one or more security alerts.
    Statuses: new, investigating, probable_false_positive, closed, false_positive.
  author: Tracecat Integration Builder
  display_group: HarfangLab EDR
  expects:
    base_url:
      type: str
      description: "HarfangLab instance URL"
      default: null
    alert_ids:
      type: list[str]
      description: "List of alert IDs to update"
      default: null
    new_status:
      type: str
      description: "New status: new, investigating, probable_false_positive, closed, false_positive"
      default: null
  steps:
    - ref: http_call
      action: core.http_request
      args:
        method: POST
        url: ${{ inputs.base_url }}/api/data/alert/alert/Alert/tag/
        headers:
          Authorization: Token ${{ SECRETS.harfanglab.API_KEY }}
          Content-Type: application/json
        payload:
          ids: ${{ inputs.alert_ids }}
          new_status: ${{ inputs.new_status }}
  returns: ${{ steps.http_call.result }}
