type: action
definition:
  name: search_endpoints
  namespace: tools.harfanglab
  title: Search Endpoints
  description: |
    Search for agents/endpoints registered in HarfangLab EDR.
    Filter by hostname, OS type, and agent status. Returns agent details including
    OS info, policy, last seen, and isolation status.
  author: Tracecat Integration Builder
  display_group: HarfangLab EDR
  expects:
    base_url:
      type: str
      description: "HarfangLab instance URL"
      default: null
    hostname:
      type: str
      description: "Hostname to search for (partial match supported)"
      default: null
    os_type:
      type: str
      description: "Filter by OS: windows, linux, macos"
      default: null
    status:
      type: str
      description: "Agent status filter"
      default: null
    limit:
      type: int
      description: "Maximum results"
      default: 50
    offset:
      type: int
      description: "Pagination offset"
      default: 0
  steps:
    - ref: http_call
      action: core.http_request
      args:
        method: GET
        url: ${{ inputs.base_url }}/api/data/endpoint/Agent/
        headers:
          Authorization: Token ${{ SECRETS.harfanglab.API_KEY }}
          Accept: application/json
        params:
          hostname: ${{ inputs.hostname }}
          ostype: ${{ inputs.os_type }}
          status: ${{ inputs.status }}
          limit: ${{ inputs.limit }}
          offset: ${{ inputs.offset }}
  returns: ${{ steps.http_call.result }}
