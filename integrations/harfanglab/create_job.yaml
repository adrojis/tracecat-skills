type: action
definition:
  name: create_job
  namespace: tools.harfanglab
  title: Create Investigation Job
  description: |
    Launch an investigation job on one or more agents in HarfangLab EDR.
    Jobs can collect artifacts, list processes/services/drivers, search IOCs, etc.
  author: Tracecat Integration Builder
  display_group: HarfangLab EDR
  expects:
    base_url:
      type: str
      description: "HarfangLab instance URL"
      default: null
    title:
      type: str
      description: "Job title"
      default: "Tracecat Investigation"
    description:
      type: str
      description: "Job description"
      default: "Automated investigation launched by Tracecat SOAR"
    agent_ids:
      type: list[str]
      description: "List of agent IDs to target"
      default: null
    actions:
      type: list[str]
      description: "Actions to perform: processlist, servicelist, driverlist, ioc, mft, hives, evtx, prefetchlist, runkeylist, scheduledtasklist, networkconnectionlist, networksharelist, sessionlist, startuplist"
      default: null
  steps:
    - ref: http_call
      action: core.http_request
      args:
        method: POST
        url: ${{ inputs.base_url }}/api/data/Job/
        headers:
          Authorization: Token ${{ SECRETS.harfanglab.API_KEY }}
          Content-Type: application/json
        payload:
          title: ${{ inputs.title }}
          description: ${{ inputs.description }}
          targets: ${{ inputs.agent_ids }}
          actions: ${{ inputs.actions }}
  returns: ${{ steps.http_call.result }}
