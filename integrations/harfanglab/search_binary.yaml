type: action
definition:
  name: search_binary
  namespace: tools.harfanglab
  title: Search Binary by Hash
  description: |
    Search for a binary in HarfangLab telemetry by its hash.
    Returns binary metadata including file path, signer info, and first/last seen timestamps.
  author: Tracecat Integration Builder
  display_group: HarfangLab EDR
  expects:
    base_url:
      type: str
      description: "HarfangLab instance URL"
      default: null
    hash:
      type: str
      description: "Hash to search (MD5, SHA1, or SHA256)"
      default: null
    hash_type:
      type: str
      description: "Hash type: md5, sha1, sha256"
      default: sha256
  steps:
    - ref: http_call
      action: core.http_request
      args:
        method: GET
        url: ${{ inputs.base_url }}/api/data/telemetry/Binary/
        headers:
          Authorization: Token ${{ SECRETS.harfanglab.API_KEY }}
          Accept: application/json
        params:
          "hashes.${{ inputs.hash_type }}__exact": ${{ inputs.hash }}
  returns: ${{ steps.http_call.result }}
