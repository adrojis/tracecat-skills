type: action
definition:
  name: get_endpoint
  namespace: tools.harfanglab
  title: Get Endpoint Details
  description: |
    Retrieve detailed information about a specific agent/endpoint by its ID.
    Returns OS, hardware, policy, network config, isolation status, and last seen timestamp.
  author: Tracecat Integration Builder
  display_group: HarfangLab EDR
  expects:
    base_url:
      type: str
      description: "HarfangLab instance URL"
      default: null
    agent_id:
      type: str
      description: "Agent ID to retrieve"
      default: null
  steps:
    - ref: http_call
      action: core.http_request
      args:
        method: GET
        url: ${{ inputs.base_url }}/api/data/endpoint/Agent/${{ inputs.agent_id }}/
        headers:
          Authorization: Token ${{ SECRETS.harfanglab.API_KEY }}
          Accept: application/json
  returns: ${{ steps.http_call.result }}
