type: action
definition:
  name: kill_process
  namespace: tools.harfanglab
  title: Kill Process
  description: |
    Request to kill a running process on an endpoint via HarfangLab EDR.
    WARNING: This is a destructive action — use with approval gates in production workflows.
  author: Tracecat Integration Builder
  display_group: HarfangLab EDR
  expects:
    base_url:
      type: str
      description: "HarfangLab instance URL"
      default: null
    process_uuid:
      type: str
      description: "UUID of the process to kill (from telemetry data)"
      default: null
  steps:
    - ref: http_call
      action: core.http_request
      args:
        method: POST
        url: ${{ inputs.base_url }}/api/data/telemetry/Processes/${{ inputs.process_uuid }}/requestKillProcess/
        headers:
          Authorization: Token ${{ SECRETS.harfanglab.API_KEY }}
          Content-Type: application/json
  returns: ${{ steps.http_call.result }}
