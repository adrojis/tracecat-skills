type: action
definition:
  name: get_alert_details
  namespace: tools.harfanglab
  title: Get Alert Details
  description: |
    Retrieve detailed information about a specific security alert by its ID.
    Returns full alert context including detection engine, affected host, process tree, and IOCs.
  author: Tracecat Integration Builder
  display_group: HarfangLab EDR
  expects:
    base_url:
      type: str
      description: "HarfangLab instance URL"
      default: null
    alert_id:
      type: str
      description: "ID of the alert to retrieve"
      default: null
  steps:
    - ref: http_call
      action: core.http_request
      args:
        method: GET
        url: ${{ inputs.base_url }}/api/data/alert/alert/Alert/${{ inputs.alert_id }}/details/
        headers:
          Authorization: Token ${{ SECRETS.harfanglab.API_KEY }}
          Accept: application/json
  returns: ${{ steps.http_call.result }}
